name: Packages
run-name: "Packages / ${{ github.ref_name }} / ${{ github.event_name }}"

on:
  push:
    branches:
      - ubuntu
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  ghcr:
    if: ${{ github.event.repository.private == false || vars.XRAY_ENABLE_HOSTED_ACTIONS == 'true' }}
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Version consistency
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF:-}" == refs/tags/* ]]; then
            bash scripts/check-release-consistency.sh --tag "${GITHUB_REF_NAME}"
          else
            bash scripts/check-release-consistency.sh
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=short

      - name: Smoke test image
        run: |
          set -euo pipefail
          docker build -t "xray-reality-smoke:${GITHUB_SHA}" .
          docker run --rm "xray-reality-smoke:${GITHUB_SHA}" --help > /tmp/help.txt
          grep -q "Usage:" /tmp/help.txt

      - name: Build and push image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Verify pushed image tags
        run: |
          set -euo pipefail
          while IFS= read -r image_tag; do
            [[ -n "$image_tag" ]] || continue
            docker buildx imagetools inspect "$image_tag" > /dev/null
          done <<< "${{ steps.meta.outputs.tags }}"

      - name: Verify anonymous pull access (optional)
        if: ${{ vars.GHCR_REQUIRE_PUBLIC == 'true' }}
        run: |
          set -euo pipefail
          token="$(curl -fsSL "https://ghcr.io/token?service=ghcr.io&scope=repository:${GITHUB_REPOSITORY}:pull" | python3 -c 'import json,sys; print(json.load(sys.stdin).get("token",""))')"
          if [[ -z "$token" ]]; then
            echo "Unable to obtain anonymous GHCR token" >&2
            exit 1
          fi
          curl -fsSI \
            -H "Authorization: Bearer ${token}" \
            -H "Accept: application/vnd.oci.image.index.v1+json" \
            "https://ghcr.io/v2/${GITHUB_REPOSITORY}/manifests/latest" > /dev/null
